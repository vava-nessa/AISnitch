name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: aisnitch (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Release workflow preflight
        if: matrix.node-version == '20'
        run: |
          node ./scripts/check-release-workflow.mjs
          npm publish --dry-run --access public

      - name: Coverage
        if: matrix.node-version == '20'
        run: pnpm test:coverage
