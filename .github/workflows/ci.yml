name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 22

jobs:
  aisnitch:
    name: aisnitch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Release workflow preflight
        run: |
          node ./scripts/check-release-workflow.mjs
          npm publish --dry-run --access public

      - name: Coverage
        run: pnpm test:coverage

  client:
    name: client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @aisnitch/client lint

      - name: Typecheck
        run: pnpm --filter @aisnitch/client typecheck

      - name: Test
        run: pnpm --filter @aisnitch/client test

      - name: Build
        run: pnpm --filter @aisnitch/client build

      - name: Coverage
        run: pnpm --filter @aisnitch/client test:coverage
